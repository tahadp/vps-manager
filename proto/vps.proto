syntax = "proto3";

package vps;

option go_package = "./pb";

service BackendService {
  // Agent sends telemetry & screenshots to Server
  rpc StreamTelemetry (stream TelemetryRequest) returns (TelemetryResponse);
  rpc UploadScreenshot (ScreenshotRequest) returns (ScreenshotResponse);
  
  // Agent heartbeat for liveness detection
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}

service AgentService {
  // Server sends commands/requests to Agent
  rpc ExecuteCommand (CommandRequest) returns (CommandResponse);
  rpc ListDirectory (DirRequest) returns (DirResponse);
  rpc ReadFile (FileRequest) returns (FileResponse);
  rpc WriteFile (WriteRequest) returns (WriteResponse);
  
  // Interactive Shell / Web PTY
  rpc ShellStream (stream ShellMessage) returns (stream ShellMessage);
}

message TelemetryRequest {
  string vps_id = 1;
  float cpu_usage = 2;
  float ram_usage = 3;
  float ram_total = 4;
  float disk_usage = 5;
  float net_tx = 6;
  float net_rx = 7;
  int64 timestamp = 8;
  float disk_total = 9;
}

message TelemetryResponse {
  bool success = 1;
  string message = 2;
}

message ShellMessage {
  string vps_id = 1;
  bytes data = 2; // Can contain stdin/stdout
}

message CommandRequest {
  string vps_id = 1;
  string command = 2; // e.g. "restart", "stop"
  int32 timeout_seconds = 3; // Timeout in seconds (default 30)
}

message CommandResponse {
  bool success = 1;
  string output = 2;
}

message DirRequest {
  string vps_id = 1;
  string path = 2;
}

message FileItem {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
}

message DirResponse {
  bool success = 1;
  repeated FileItem files = 2;
  string error = 3;
}

message FileRequest {
  string vps_id = 1;
  string path = 2;
}

message FileResponse {
  bool success = 1;
  bytes content = 2;
  string error = 3;
}

message WriteRequest {
  string vps_id = 1;
  string path = 2;
  bytes content = 3;
}

message WriteResponse {
  bool success = 1;
  string error = 2;
}

message ScreenshotRequest {
  string vps_id = 1;
  bytes image_data = 2;
}

message ScreenshotResponse {
  bool success = 1;
}

message HeartbeatRequest {
  string vps_id = 1;
  int64 timestamp = 2;
}

message VpsSettingsMessage {
  int32 screenshot_interval_sec = 1;
  int32 telemetry_interval_sec = 2;
  bool ram_disk_visible = 3;
  bool network_visible = 4;
}

message HeartbeatResponse {
  bool success = 1;
  VpsSettingsMessage settings = 2;
}
