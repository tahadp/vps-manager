syntax = "proto3";

package vps;

option go_package = "./pb";

service BackendService {
  rpc StreamTelemetry (stream TelemetryRequest) returns (TelemetryResponse);
  rpc UploadScreenshot (ScreenshotRequest) returns (ScreenshotResponse);
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);

  rpc StreamAgentIO (stream AgentMessage) returns (stream ServerMessage);
}

message TelemetryRequest {
  string vps_id = 1;
  float cpu_usage = 2;
  float ram_usage = 3;
  float ram_total = 4;
  float disk_usage = 5;
  float net_tx = 6;
  float net_rx = 7;
  int64 timestamp = 8;
  float disk_total = 9;
  int64 uptime = 10;
}

message TelemetryResponse {
  bool success = 1;
  string message = 2;
}

message ScreenshotRequest {
  string vps_id = 1;
  bytes image_data = 2;
}

message ScreenshotResponse {
  bool success = 1;
}

message HeartbeatRequest {
  string vps_id = 1;
  int64 timestamp = 2;
  string agent_ip = 3;
}

message VpsSettingsMessage {
  int32 screenshot_interval_sec = 1;
  int32 telemetry_interval_sec = 2;
  bool ram_disk_visible = 3;
  bool network_visible = 4;
  bool telegram_enabled = 5;
  string custom_alert_message = 6;
  repeated string visible_charts = 7;
}

message HeartbeatResponse {
  bool success = 1;
  VpsSettingsMessage settings = 2;
}

message ServerMessage {
  string request_id = 1;
  oneof body {
    CommandRequest       exec         = 11;
    DirRequest           listdir      = 12;
    FileRequest          read         = 13;
    WriteRequest         write        = 14;
    ShellOpenRequest     shell_open   = 15;
    ShellInputRequest    shell_input  = 16;
    ShellCloseRequest    shell_close  = 17;
    RefreshRequest       refresh      = 18;
    SettingsUpdate       settings_update = 19;
    DeleteFileRequest    delete_file  = 20;
    MkdirRequest         mkdir        = 21;
    RenameFileRequest    rename_file  = 22;
  }
}

message AgentMessage {
  string request_id = 1;
  oneof body {
    RegisterRequest      register     = 10;
    CommandResponse      exec_result  = 11;
    DirResponse          listdir_result = 12;
    FileResponse         read_result  = 13;
    WriteResponse        write_result = 14;
    ShellOpenedResponse  shell_opened = 15;
    ShellOutput          shell_output = 16;
    ShellClosedResponse  shell_closed = 17;
    RefreshAck           refresh_ack  = 18;
    FileOperationResponse file_op_result = 19;
  }
}

message RegisterRequest {
  string vps_id = 1;
  string agent_ip = 2;
}

message CommandRequest {
  string vps_id = 1;
  string command = 2;
  int32 timeout_seconds = 3;
}

message CommandResponse {
  bool success = 1;
  string output = 2;
}

message DirRequest {
  string vps_id = 1;
  string path = 2;
}

message FileItem {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
}

message DirResponse {
  bool success = 1;
  repeated FileItem files = 2;
  string error = 3;
}

message FileRequest {
  string vps_id = 1;
  string path = 2;
}

message FileResponse {
  bool success = 1;
  bytes content = 2;
  string error = 3;
}

message WriteRequest {
  string vps_id = 1;
  string path = 2;
  bytes content = 3;
}

message WriteResponse {
  bool success = 1;
  string error = 2;
}

message ShellOpenRequest {
  string session_id = 1;
  string vps_id = 2;
  string shell = 3;
}

message ShellOpenedResponse {
  string session_id = 1;
  bool success = 2;
  string error = 3;
}

message ShellInputRequest {
  string session_id = 1;
  bytes data = 2;
}

message ShellOutput {
  string session_id = 1;
  bytes data = 2;
}

message ShellCloseRequest {
  string session_id = 1;
}

message ShellClosedResponse {
  string session_id = 1;
}

message RefreshRequest {
  string vps_id = 1;
}

message RefreshAck {
  bool success = 1;
  // Semantic: Ack confirms the refresh was ACCEPTED and queued. It does NOT
  // mean telemetry/screenshot have completed — those arrive on their own
  // streams. Possible values: "queued" | "stream_busy" | "agent_offline".
  string message = 2;
}

message SettingsUpdate { string vps_id = 1; VpsSettingsMessage settings = 2; }
message DeleteFileRequest { string vps_id = 1; string request_id = 2; string path = 3; }
message MkdirRequest { string vps_id = 1; string request_id = 2; string path = 3; }
message RenameFileRequest { string vps_id = 1; string request_id = 2; string old_path = 3; string new_path = 4; }
message FileOperationResponse { bool success = 1; string error = 2; }
