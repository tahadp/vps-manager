version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vps_postgres
    environment:
      POSTGRES_USER: vps_admin
      POSTGRES_PASSWORD: YOUR_PASSWORD
      POSTGRES_DB: vps_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vps_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
