version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vps_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vps_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vps_management}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vps_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vps_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vps_server
    ports:
      - "${PORT:-4567}:4567"
      - "${GRPC_PORT:-50051}:50051"
    environment:
      PORT: ${PORT:-4567}
      GRPC_PORT: ${GRPC_PORT:-50051}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ALLOW_CUSTOM_SCRIPTS: ${ALLOW_CUSTOM_SCRIPTS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4567}
        NEXT_PUBLIC_RUSTDESK_URL: ${NEXT_PUBLIC_RUSTDESK_URL:-}
    container_name: vps_client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4567}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
